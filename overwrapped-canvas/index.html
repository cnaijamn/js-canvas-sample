<html>
  <head>
    <meta charset="UTF-8">
    <title>Canvas tutorial</title>
    <style type="text/css">
    <!--
    canvas { border: 1px solid #999; }
    #rect {
      position:absolute;
      top:0px;
      left:0px;
    }
    #path {
      position:absolute;
      top:50px;
      left:50px;
    }
    #gl {
      position:absolute;
      top:100px;
      left:100px;
    }
    #arc {
      position:absolute;
      top:150px;
      left:150px;
    }
    #color {
      position:absolute;
      top:200px;
      left:200px;
    }
    -->
    </style>
    <script type="text/javascript" src="./canvas.js"></script>
    <script type="text/javascript" src="./script.js"></script>
    <script type="text/javascript" src="./minMatrix.js"></script>
    <script type="text/javascript">
      function draw() {
        drawRect('rect');
        drawGL('gl');
        drawPath('path');
        drawArc('arc');
        drawColor('color');
      }
    </script>
    <script id="vs" type="x-shader/x-vertex">
attribute vec3 position;
uniform   mat4 mvpMatrix;

void main(void){
	gl_Position = mvpMatrix * vec4(position, 1.0);
}
    </script>
    <script id="fs" type="x-shader/x-fragment">
void main(void){
	gl_FragColor = vec4(1.0, 0.0, 0.0, 1.0);
}
    </script>
  </head>
  <body onload="draw();">
    <canvas id="rect" width="400" height="300"></canvas>
    <canvas id="gl" width="400" height="300"></canvas>
    <canvas id="path" width="400" height="300"></canvas>
    <canvas id="arc" width="400" height="300"></canvas>
    <canvas id="color" width="400" height="300"></canvas>
    <div id="output"></div>
  </body>
</html>
