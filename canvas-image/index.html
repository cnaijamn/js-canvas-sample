<!DOCTYPE html>
<html>
  <head>
    <meta charset=utf-8>
    <title></title>
    <script type="text/javascript">
// クラス
var ImgObj = function(src, ctx, name, x, y, w, h) {
  this.__initialize.apply(this, arguments);
};
// 初期化
ImgObj.prototype.__initialize = function(src, ctx, name, x, y, w, h) {
  var img = new Image();

  this.img = img;
  this.name = name;
  this.x = x;
  this.y = y;
  this.w = w;
  this.h = h;
  this.img.src = src;
  this.img.onload = function() {
    // 画像ロード後、描画
    ctx.drawImage(img, x, y, w, h);
  };
};
// 指定座標での存在有無
ImgObj.prototype.exist = function(x, y) {
  return (this.x <= x && this.x + this.w >= x
          && this.y <= y && this.y + this.h >= y);
};

// 処理開始
var start = function() {
  var canvas = document.getElementById('canvas'),
      ctx = canvas.getContext('2d'),
      srcs = [ './t.png', './t.png', './t.png', './t.png' ],
      imgs = [],
      i;

  // 描画
  for (i in srcs) {
    imgs[i] = new ImgObj(srcs[i], ctx, 'img:' + i, i * 50, i * 50, 50, 50);
  }

  // クリック処理
  canvas.addEventListener('click', function(e) {
    var x = e.clientX - canvas.offsetLeft,
        y = e.clientY - canvas.offsetTop;

    ctx.fillStyle = 'rgb(255, 255, 255)';
    ctx.fillRect(0, 200, 200, 220);

    // クリック位置に画像があれば、情報表示
    for (i in imgs) {
      if (imgs[i].exist(x, y)) {
        ctx.fillStyle = 'rgb(0, 0, 0)';
        ctx.fillText(imgs[i].name + '(' + x + ', ' + y + ')だよ！', 5, 215);
      }
    }

  }, false);
};
    </script>
  </head>
  <body onload="start()">
    <canvas id="canvas" style="border: 1px solid gray" width="200" height="220" />
  </body>
</html>
